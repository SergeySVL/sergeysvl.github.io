<!DOCTYPE html>
<html lang="en">
<head>
	<title>Midterm Practical Test</title>
	<meta content="html forms, web design, comp213" name="keywords">
	<meta content="An example of using HTML forms" name="description">
	<script src="contact.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" 
    integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" 
    referrerpolicy="no-referrer"/>
	<link href="../midterm.css" rel="stylesheet" type="text/css">
</head>

<body>
	<div id="allPage">
		<header>
			<img src="../assets/city.jfif" alt="Miami Retro">
			<h1 class="align-center">Contact Us</h1>
		</header>
		<form name="signin" action="https://webdevbasics.net/scripts/pacific.php" method="post">
		<fieldset>
				<legend>Please Enter Your Information</legend>
					<p>
						<label for="txtFName">First Name:&nbsp&nbsp&nbsp&nbsp</label>
						<input type="text" name="txtFName" id="txtFName" size="25" required placeholder="your first name">
					</p>
					<p>
						<label for="txtLName">Last Name:&nbsp&nbsp&nbsp&nbsp</label>
						<input type="text" name="txtLName" id="txtLName" size="25" required placeholder="your last name">
					</p>
					<p>
					<p>
						<label for="email">Email:&nbsp&nbsp&nbsp&nbsp</label>
						<input type="email" name="email" id="email" size="25" required placeholder="example@gmail.com">
					</p>
					<p>					
					<p>
						<label for="txtSpecial">Your Message to Us:&nbsp&nbsp&nbsp&nbsp</label>
						<textarea id="txtSpecial" name="txtSpecial" cols="50" rows="8" required placeholder="#-- Please place your message here --#"></textarea>
					</p>
						<p class="align-center"><button type="submit">Submit</button>
						<button type="reset">Reset</button></p>
	        <br><br><div class="row">
            <br><button type="button" class="btn btn-warning col-3 mx-left" id="react">Back to Main Page</button>
            </div>

					</fieldset>
		</form>
        <br><footer><h6>&copy;&nbsp;&nbsp;Sergey Logunov, COMP 125 Section 402 - Winter 2026 term - Midterm Practical Test<h6></footer><br>
	</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
