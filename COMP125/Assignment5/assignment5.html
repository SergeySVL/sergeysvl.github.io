<body>
    <div class="container bg-info bg-gradient">
      <h1>Member Registration</h1>
      <h3>Please complete all the fields below:</h3>

      <form id="signin" name="signin" action="https://webdevbasics.net/scripts/pacific.php" method="post">

        <div class="mb-3 row">
          <label for="firstName" class="col-sm-2 col-form-label">First Name:</label>
          <input type="text" name="FirstName" class="form-control w-50" id="firstName" placeholder="mandatory field">
        </div>

        <div class="mb-3 row">
          <label for="lastName" class="col-sm-2 col-form-label">Last Name:</label>
          <input type="text" name="LastName" class="form-control w-50" id="lastName" placeholder="mandatory field">
        </div>

        <div class="mb-3 row">
          <label for="address" class="col-sm-2 col-form-label">Address:</label>
          <input type="text" name="Address" class="form-control w-50" id="address" placeholder="mandatory field">
        </div>

        <div class="mb-3 row">
          <label for="city" class="col-sm-2 col-form-label">City:</label>
          <input type="text" name="City" class="form-control w-50" id="city" placeholder="mandatory field">
        </div>

        <div class="mb-3 row">
          <label for="postalCode" class="col-sm-2 col-form-label">Postal Code:</label>
          <input type="text" name="PostalCode" class="form-control w-50" id="postalCode" placeholder="mandatory field - Enter a Canadian postal code in A0A0A0 format">
        </div>

        <div class="mb-3 row">
          <label for="province" class="col-sm-2 col-form-label">Province:</label>
          <input type="text" name="Province" class="form-control w-50" id="province" placeholder="mandatory field - one of QC, ON, MN, SK, AB, BC">
        </div>

        <div class="mb-3 row">
          <label for="age" class="col-sm-2 col-form-label">Age:</label>
          <input type="text" name="Age" class="form-control w-50" id="age" placeholder="mandatory field - at least 18">
        </div>

        <div class="mb-3 row">
          <label for="inputPassword1" class="col-sm-2 col-form-label">Password:</label>
          <input type="password" name="Password1" class="form-control w-50" id="inputPassword1" placeholder="mandatory field">
        </div>

        <div class="mb-3 row">
          <label for="inputPassword2" class="col-sm-2 col-form-label">Confirm Password:</label>
          <input type="password" name="Password2" class="form-control w-50" id="inputPassword2" placeholder="mandatory field equal to Password">
        </div>

        <div class="mb-3 row">
          <label for="inputEmail1" class="col-sm-2 col-form-label">Email:</label>
          <input type="email" name="Email" class="form-control w-50" id="inputEmail1" placeholder="mandatory field - should contain @ and .">
        </div>

        <button type="submit" class="btn btn-primary">Register Now</button>
        <button type="reset" class="btn btn-primary">Clear Form</button>

      </form>

        <br><footer><h6>&copy;&nbsp;&nbsp;Sergey Logunov, COMP 125 Section 402 - Winter 2026 term - Assignment 5<h6></footer><br>
    </div>
